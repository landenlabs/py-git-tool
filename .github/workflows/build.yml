name: Build and Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            artifact: git-tool
            icon: icon.icns
          - os: windows-latest
            artifact: git-tool.exe
            icon: icon.ico

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Build
        run: >-
          pyinstaller --onefile --name git-tool
          --icon "${{ matrix.icon }}"
          git-tool.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: git-tool-${{ matrix.os }}
          path: dist/${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/git-tool-macos-latest/git-tool
            artifacts/git-tool-windows-latest/git-tool.exe
